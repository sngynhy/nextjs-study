services:
  web:
    image: node:22-bookworm
    working_dir: /app
    container_name: nextjs-dashboard
    command: >
      sh -c "corepack enable &&
             pnpm install --frozen-lockfile &&
             pnpm dev"
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - WATCHPACK_POLLING=true # Windows 호스트 환경에서 Hot Reload(코드 수정 즉시 반영) 보장
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - pnpm_cache:/root/.local/share/pnpm/store # pnpm 캐시 볼륨을 추가 > 컨테이너 restart 시 install 시간 절약
    stdin_open: true
    tty: true
    depends_on: # 웹 서버 구동 전 DB가 정상적으로 구동될 때까지 대기 > 순차적 실행 보장
      postgres:
        condition: service_healthy # DB가 '정상(Healthy)' 상태가 될 때까지 웹 서버 구동 대기

  postgres:
    image: postgres:16
    profiles: ['local-db'] # docker-compose.yml 파일에서 해당 서비스를 실행할 때만 사용 > DB가 필요할 때만 선택적으로 켜고 끄기
    container_name: nextjs-dashboard-postgres-db
    environment:
      POSTGRES_DB: nextjs_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: # 컨테이너 시작 시 데이터베이스 접속 가능 여부 확인
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nextjs_dashboard'] # pg_isready 명령어를 사용하여 데이터베이스 접속 가능 여부 확인
      interval: 10s # 10초마다 한 번씩 확인
      timeout: 5s # 5초 이내에 확인 결과를 받지 못하면 실패로 간주
      retries: 5 # 최대 5번 실패 시 컨테이너 중단

volumes:
  node_modules:
  next_cache:
  pnpm_cache:
  postgres_data:

## 실행 명령어
# 기본 실행: docker-compose up
# 백그라운드 실행: docker-compose up -d
# DB 실행: docker-compose --profile local-db up
# 중지: docker-compose down
# 중지 및 삭제: docker-compose down -v
